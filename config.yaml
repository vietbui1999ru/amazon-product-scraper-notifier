scheduler:
  check_interval_seconds: 30  # 30s for demo; set to 300 for production

notifications:
  # Single notifier: "console" or "slack"
  # Both at once:   ["console", "slack"]
  # Slack requires slack_webhook_url to be set (or SLACK_WEBHOOK_URL env var)
  method: "console"
  slack_webhook_url: ""
  price_drop_threshold_percent: 1.0
  price_drop_threshold_absolute: 0.0

scraper:
  # Proxy list for rotation. Format: http://user:pass@host:port or http://host:port
  # Leave empty to scrape without proxy (lower success rate on Amazon).
  # Override at runtime with PROXY_LIST=url1,url2,url3 env var.
  proxies: []

# database.url is set via DATABASE_URL env var (or backend/.env)
