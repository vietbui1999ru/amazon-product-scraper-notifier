services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "10.20.0.3:8080:80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    shm_size: '256m'
    networks:
      - internal
    ports:
      - "10.20.0.3:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://pricechecker:${POSTGRES_PASSWORD}@postgres:5432/pricechecker
      REDIS_URL: redis://redis:6379
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      CHECK_INTERVAL_SECONDS: ${CHECK_INTERVAL_SECONDS:-300}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CONFIG_PATH: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./scripts:/app/scripts:ro

  docs:
    build:
      context: .
      dockerfile: Dockerfile.docs
    restart: unless-stopped
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_USER: pricechecker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pricechecker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricechecker -d pricechecker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  internal:
    internal: true

volumes:
  postgres_data:
  redis_data:
