services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - web
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    networks:
      - web
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - web

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    shm_size: '256m'
    networks:
      - web
      - db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://pricechecker:${POSTGRES_PASSWORD}@postgres:5432/pricechecker
      REDIS_URL: redis://redis:6379
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_KEY: ${API_KEY:-}
      CONFIG_PATH: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./scripts:/app/scripts:ro

  docs:
    build:
      context: .
      dockerfile: Dockerfile.docs
    restart: unless-stopped
    networks:
      - web

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - db
    environment:
      POSTGRES_USER: pricechecker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pricechecker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricechecker -d pricechecker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - db
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  web:
    driver: bridge
  db:
    internal: true
    driver: bridge

volumes:
  postgres_data:
  redis_data:
